scenario_name: thesis_4_3_risk_fps_demo
time_range: {duration_s: 6.0, step_s: 1.0}
patients:
  - id: A
    is_patient_label: yes
    age_group_label: old
    position: {x: 2.0, y: 2.0}
    action_label: neutral_sitting
  - id: B
    is_patient_label: yes
    age_group_label: old
    position: {x: 4.0, y: 2.0}
    action_label: neutral_sitting
objects:
  - id: handrail_a
    type: handrail
    position: {x: 1.8, y: 2.0}
  - id: wheelchair_b
    type: wheelchair
    position: {x: 4.1, y: 2.0}
staff:
  - id: staff_1
    position: {x: 2.1, y: 2.0}
    velocity: {vx: -0.1, vy: 0.0}
events:
  - time_s: 2.0
    event_type: set_action
    target_id: B
    action_label: standing_up
  - time_s: 4.0
    event_type: move_staff
    target_id: staff_1
    position: {x: 5.5, y: 5.5}
    velocity: {vx: 0.2, vy: 0.2}

